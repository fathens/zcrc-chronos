name: CI

on:
  push:

env:
  PYTHONUNBUFFERED: 1

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
      
      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
      
      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v3
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-
      
      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml
      
      # 開発ツールのインストール
      - name: Install formatting tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install black isort
      
      # フォーマットチェック
      - name: Check code formatting
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          black --check src tests
          isort --check-only --profile black src tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
      
      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
      
      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v3
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-
      
      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml
      
      # リンターツールのインストール
      - name: Install linting tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install flake8 flake8-pyproject
      
      # リントチェック
      - name: Lint with flake8
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          flake8 src tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
      
      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
      
      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v3
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-
      
      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml
      
      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist
      
      # テスト実行
      - name: Test with pytest
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest -xvs -n auto
