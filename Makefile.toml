# Makefile.toml
# makers configuration for zcrc-chronos development
# コミット前の品質チェックを簡単に実行するためのコマンド

[tasks.py-format]
description = "コードフォーマット (black, isort)"
script = [
    "echo '🔧 コードフォーマットを実行しています...'",
    "black .",
    "isort .",
    "echo '✅ フォーマット完了'"
]

[tasks.format-check]
description = "フォーマットチェック（修正なし）"
script = [
    "echo '🔍 フォーマットをチェックしています...'",
    "black --check --diff .",
    "isort --check-only --profile black .",
    "echo '✅ フォーマットチェック完了'"
]

[tasks.lint]
description = "リント実行 (flake8)"
script = [
    "echo '🔍 リントを実行しています...'",
    "flake8 .",
    "echo '✅ リント完了'"
]

[tasks.test]
description = "テスト実行 (pytest)"
script = [
    "echo '🧪 テストを実行しています...'",
    "pytest tests/ -v",
    "echo '✅ テスト完了'"
]

[tasks.test-fast]
description = "高速テスト（失敗時停止）"
script = [
    "echo '🧪 高速テストを実行しています...'",
    "pytest tests/ -x --tb=short",
    "echo '✅ 高速テスト完了'"
]

[tasks.test-parallel]
description = "並列テスト実行（推奨）"
script = [
    "echo '🧪 並列テストを実行しています...'",
    "pytest tests/ -n auto -v --tb=short",
    "echo '✅ 並列テスト完了'"
]

[tasks.test-critical]
description = "重要テストのみ並列実行（CI用）"
script = [
    "echo '🎯 重要テストを並列実行しています...'",
    "pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n auto -v",
    "echo '✅ 重要テスト完了'"
]

[tasks.test-split]
description = "テスト分割実行（段階的）"
script = [
    "echo '📋 段階的テスト実行を開始しています...'",
    "echo '1️⃣ 高速テスト（API・基本機能）'",
    "pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py -n auto -v",
    "echo '2️⃣ 無効入力テスト'",
    "pytest tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n 2 -v",
    "echo '3️⃣ 基本予測テスト'",
    "pytest tests/test_models.py::test_predictor_initialization tests/test_models.py::test_zero_shot_predict_implementation_verification -v",
    "echo '✅ 段階的テスト完了'"
]

[tasks.check]
description = "全チェック（コミット前推奨）"
dependencies = ["format-check", "lint"]
command = "echo"
args = ["✅ 全チェック完了 - コミット可能です"]

[tasks.all]
description = "全処理実行"
dependencies = ["py-format", "lint", "test"]
command = "echo"
args = ["✅ 全処理完了"]

[tasks.pre-commit]
description = "pre-commitフック設定"
script = [
    "echo '⚙️  pre-commitフックを設定しています...'",
    "pip install pre-commit",
    "pre-commit install",
    "echo '✅ pre-commitフック設定完了'"
]

[tasks.clean]
description = "一時ファイル削除"
script = [
    "echo '🧹 一時ファイルを削除しています...'",
    "find . -type f -name '*.pyc' -delete",
    "find . -type d -name '__pycache__' -delete",
    "find . -type d -name '.pytest_cache' -exec rm -rf {} + || true",
    "find . -type d -name '*.egg-info' -exec rm -rf {} + || true",
    "echo '✅ クリーンアップ完了'"
]

[tasks.ci-check]
description = "CIと同じチェック（並列最適化版）"
script = [
    "echo '🔄 CI並列チェックを実行しています...'",
    "black --check .",
    "isort --check-only --profile black .",
    "flake8 .",
    "pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n auto -v --tb=short",
    "echo '✅ CI並列チェック完了'"
]

[tasks.ci-comprehensive]
description = "CI包括テスト（段階的実行）"
script = [
    "echo '🔄 CI包括テストを実行しています...'",
    "echo '段階1: 高速テスト（API・基本機能）'",
    "pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py -n auto -v --tb=short",
    "echo '段階2: 無効入力テスト'",
    "pytest tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n 2 -v --tb=short",
    "echo '段階3: 基本予測テスト'",
    "pytest tests/test_models.py::test_predictor_initialization tests/test_models.py::test_zero_shot_predict_implementation_verification -v --tb=short",
    "echo '✅ CI包括テスト完了'"
]

[tasks.setup]
description = "開発環境の初期セットアップ"
script = [
    "echo '🚀 開発環境をセットアップしています...'",
    "echo '📦 conda環境を更新中...'",
    "conda env update -f environment.yml",
    "echo '🔧 pre-commitフックを設定中...'",
    "pip install pre-commit",
    "pre-commit install",
    "echo '✅ セットアップ完了! 以下のコマンドが利用可能です:'",
    "echo '  makers py-format   - コードフォーマット (black, isort)'",
    "echo '  makers check       - 全チェック実行 (format + lint)'",
    "echo '  makers all         - 全処理実行 (format + lint + test)'",
    "echo '  makers help        - コマンド一覧表示'"
]

[tasks.setup-conda-only]
description = "conda環境のみセットアップ（pre-commitなし）"
script = [
    "echo '📦 conda環境を更新しています...'",
    "conda env update -f environment.yml",
    "echo '✅ conda環境セットアップ完了!'"
]

[tasks.help]
description = "利用可能なコマンド表示"
script = [
    "echo '利用可能なコマンド:'",
    "echo ''",
    "echo '🚀 セットアップ:'",
    "echo '  makers setup          - 開発環境の初期セットアップ（推奨）'",
    "echo '  makers setup-conda-only - conda環境のみセットアップ'",
    "echo ''",
    "echo '🔧 開発作業:'",
    "echo '  makers py-format      - コードフォーマット (black, isort)'",
    "echo '  makers lint           - リント実行 (flake8)'",
    "echo '  makers check          - 全チェック実行 (format + lint)'",
    "echo '  makers all            - 全処理実行 (format + lint + test)'",
    "echo ''",
    "echo '🧪 テスト:'",
    "echo '  makers test           - 基本テスト実行'",
    "echo '  makers test-parallel  - 並列テスト実行（推奨）'",
    "echo '  makers test-critical  - 重要テストのみ並列実行'",
    "echo '  makers test-split     - 段階的テスト実行'",
    "echo '  makers test-fast      - 高速テスト（失敗時停止）'",
    "echo ''",
    "echo '🛠️  ユーティリティ:'",
    "echo '  makers clean          - 一時ファイル削除'",
    "echo '  makers pre-commit     - pre-commitフック設定'",
    "echo ''",
    "echo '🚀 CI/CD:'",
    "echo '  makers ci-check       - CI並列チェック（高速）'",
    "echo '  makers ci-comprehensive - CI包括テスト（段階的）'"
]
