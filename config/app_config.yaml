# アプリケーション設定

# サーバー設定
server:
  host: "0.0.0.0"
  port: 8000
  debug: true
  workers: 4
  reload: true  # 開発環境用

# API設定
api:
  title: "zcrc-chronos API"
  description: "chronos-boltを使用した時系列予測API"
  version: "0.1.0"
  prefix: "/api/v1"
  cors_origins:
    - "*"  # 本番環境では特定のオリジンに制限すること
  rate_limit: 100  # リクエスト/分

# ログ設定
logging:
  level: "INFO"
  format: "{time} | {level} | {message}"
  # ファイル出力は使用しない（標準出力のみ）
  file: null
  rotation: null
  retention: null

# データ設定
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"
  queue_dir: "data/queue"  # 永続化キューディレクトリ

# 並列処理設定
prediction:
  max_concurrent_tasks: 3  # 同時実行可能な予測タスク数
  queue_storage: "file"    # file: ファイルベース, memory: メモリベース
  queue_size: -1           # -1: 無制限（ファイルベースの場合）
  autogluon_n_jobs: 1      # AutoGluon内部の並列度制限

# セキュリティ設定
security:
  enable_auth: false  # 本番環境ではtrueに設定
  api_key_header: "X-API-Key"
  allowed_api_keys: []  # 本番環境では設定する
