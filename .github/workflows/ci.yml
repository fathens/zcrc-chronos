name: CI

on:
  push:

env:
  PYTHONUNBUFFERED: 1

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # 開発ツールのインストール
      - name: Install formatting tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install black isort

      # フォーマットチェック
      - name: Check code formatting
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          black --check src tests
          isort --check-only --profile black src tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # リンターツールのインストール
      - name: Install linting tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install flake8 flake8-pyproject

      # リントチェック
      - name: Lint with flake8
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          flake8 src tests

  # 高速テスト: 重要な機能のみ並列実行
  test-critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist

      # 重要テストのみ並列実行（最速）
      - name: Critical tests with parallel execution
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n auto -v --tb=short --cov=src --cov-report=term-missing

      # テスト結果のアップロード
      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-critical
          path: .coverage

  # 包括テスト: 全テストを段階的に実行
  test-comprehensive:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/'))
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist

      # 段階1: 高速テスト（API・基本機能）
      - name: Fast tests (API & Basic)
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py -n auto -v --tb=short

      # 段階2: 無効入力テスト
      - name: Invalid input tests
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n 2 -v --tb=short

      # 段階3: 基本予測テスト
      - name: Basic prediction tests
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_models.py::test_predictor_initialization tests/test_models.py::test_zero_shot_predict_implementation_verification -v --tb=short

      # 段階4: 残りのテスト（時間制限付き）
      - name: Remaining tests (time limited)
        shell: bash -l {0}
        timeout-minutes: 10
        continue-on-error: true
        run: |
          conda activate zcrc-chronos
          pytest tests/ -k "not (test_api or test_simple or TestPredictZeroShotInvalidInputs or test_predictor_initialization or test_zero_shot_predict_implementation_verification)" -n auto -v --tb=short --maxfail=3

  # マトリックステスト: 複数環境での検証
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
        test-suite: ['critical', 'integration']
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ matrix.os }}-${{ matrix.python-version }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: |
            conda-pkgs-${{ matrix.os }}-${{ matrix.python-version }}-
            conda-pkgs-${{ matrix.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist

      # Critical テストスイート
      - name: Run critical test suite
        if: matrix.test-suite == 'critical'
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_api.py tests/test_simple.py tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n auto -v --tb=short

      # Integration テストスイート
      - name: Run integration test suite
        if: matrix.test-suite == 'integration'
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_integration.py tests/test_library_compatibility.py -n 2 -v --tb=short
