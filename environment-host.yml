name: zcrc-chronos-gpu
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - cython  # PyYAMLビルド用に追加
  - setuptools  # ビルド環境強化のために追加
  - pip:
    # PyTorch with MPS support for Apple Silicon (ホスト環境用)
    - torch~=2.7.0  # Apple Silicon MPS support
    - torchvision~=0.22.0
    - torchaudio~=2.7.0

    # Core dependencies
    - autogluon.timeseries>=1.3.0  # Chronos-Bolt を含む時系列予測ライブラリ
    - fastapi~=0.115.0      # APIフレームワーク
    - uvicorn~=0.32.0      # ASGIサーバー
    - pydantic~=2.11.0      # データバリデーション
    - pyyaml~=6.0.1         # YAML設定ファイル (6.0.1以降を指定してCython 3互換性問題を回避)

    # Data processing
    - pandas~=2.2.3        # データ処理
    - numpy~=1.26.0        # 数値計算（autogluon-tabularとの互換性のため）
    - scikit-learn~=1.5.0  # 機械学習ユーティリティ

    # Utilities
    - python-dotenv~=1.0.0 # 環境変数管理
    - loguru~=0.7.0        # ロギング

    # Testing
    - pytest~=8.3.0        # テスト
    - pytest-xdist~=3.7.0  # 並列テスト実行
    - pytest-cov~=6.0.0    # カバレッジ測定
    - httpx~=0.27.0        # HTTPクライアント（テスト用）

    # Optional dependencies
    - matplotlib~=3.10.0    # 可視化（オプション）
    - plotly~=6.0.0       # インタラクティブ可視化（オプション）
