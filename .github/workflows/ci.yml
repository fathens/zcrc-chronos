name: CI

on:
  push:

jobs:
  # 共通の依存関係をインストールするジョブを追加
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v3
      
      # キャッシュキーを生成
      - name: Generate cache key
        id: cache-key
        run: echo "key=conda-env-${{ hashFiles('environment.yml') }}-${{ hashFiles('**/*.py') }}" >> $GITHUB_OUTPUT
      
      # 共通のセットアップと環境構築
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
          use-mamba: true
      
      # 環境のキャッシュ
      - name: Cache Conda env
        uses: actions/cache@v3
        id: cache
        with:
          path: /usr/share/miniconda3/envs/zcrc-chronos
          key: ${{ steps.cache-key.outputs.key }}
      
      # キャッシュがない場合のみ環境を構築
      - name: Create conda environment
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml
      
      # 開発ツールをインストール
      - name: Install dev tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install black isort flake8 flake8-pyproject pytest pytest-cov

  # 並列実行されるジョブを定義
  format:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # キャッシュされた環境を利用
      - name: Restore cached Conda env
        uses: actions/cache@v3
        with:
          path: /usr/share/miniconda3/envs/zcrc-chronos
          key: ${{ needs.setup.outputs.cache-key }}
      
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: false
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
      
      - name: Check formatting
        shell: bash -l {0}
        run: |
          black --check src tests
          isort --check-only --profile black src tests

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # キャッシュされた環境を利用
      - name: Restore cached Conda env
        uses: actions/cache@v3
        with:
          path: /usr/share/miniconda3/envs/zcrc-chronos
          key: ${{ needs.setup.outputs.cache-key }}
      
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: false
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
      
      - name: Lint with flake8
        shell: bash -l {0}
        run: |
          flake8 src tests

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # キャッシュされた環境を利用
      - name: Restore cached Conda env
        uses: actions/cache@v3
        with:
          path: /usr/share/miniconda3/envs/zcrc-chronos
          key: ${{ needs.setup.outputs.cache-key }}
      
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: false
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3
      
      - name: Test with pytest
        shell: bash -l {0}
        run: |
          pytest
