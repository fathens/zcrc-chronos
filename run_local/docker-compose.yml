name: local-zcrc-chronos
services:
  zcrc-chronos:
    build:
      context: ..
      dockerfile: Dockerfile
    image: zcrc-chronos:latest
    container_name: zcrc-chronos
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - chronos-network

networks:
  chronos-network:
    driver: bridge
