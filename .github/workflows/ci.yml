name: CI

on:
  push:

env:
  PYTHONUNBUFFERED: 1

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # 開発ツールのインストール
      - name: Install formatting tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install black isort

      # フォーマットチェック
      - name: Check code formatting
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          black --check src tests
          isort --check-only --profile black src tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # リンターツールのインストール
      - name: Install linting tools
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install flake8 flake8-pyproject

      # リントチェック
      - name: Lint with flake8
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          flake8 src tests


  # 包括テスト: すべてのテストの完了を待つ集約ジョブ
  test-comprehensive:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/'))
    needs: [test-matrix-lite, test-matrix-heavy]
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12'
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: conda-pkgs-${{ runner.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist

      # 包括テスト完了の確認
      - name: Comprehensive test completion
        shell: bash -l {0}
        run: |
          echo "✅ すべての包括テストが完了しました"
          echo "Lite: Critical, Integration"
          echo "Heavy: Models, Async, Extended"
          echo "全テストスイートが正常に実行されました"

  # 軽量テスト: 全ブランチで実行
  test-matrix-lite:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
        test-suite: ['critical', 'integration']
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ matrix.os }}-${{ matrix.python-version }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: |
            conda-pkgs-${{ matrix.os }}-${{ matrix.python-version }}-
            conda-pkgs-${{ matrix.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist

      # Critical テストスイート（カバレッジ付き）
      - name: Run critical test suite
        if: matrix.test-suite == 'critical'
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_api.py tests/test_simple.py tests/test_simple_unittest.py tests/test_predict_zero_shot.py::TestPredictZeroShotInvalidInputs -n auto -v --tb=short --cov=src --cov-report=term-missing

      # Integration テストスイート
      - name: Run integration test suite
        if: matrix.test-suite == 'integration'
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_integration.py tests/test_library_compatibility.py -n 2 -v --tb=short

      # カバレッジレポートのアップロード
      - name: Upload coverage reports
        if: matrix.test-suite == 'critical' && success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-critical
          path: .coverage

  # 重量テスト: 重要ブランチでのみ実行
  test-matrix-heavy:
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/'))
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
        test-suite: ['models', 'async', 'extended']
    steps:
      - uses: actions/checkout@v4

      # Conda環境のセットアップ
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          activate-environment: zcrc-chronos
          miniforge-variant: Miniforge3

      # 環境ファイルのハッシュを取得してキャッシュキーに使用
      - name: Get environment hash
        id: env-hash
        run: echo "hash=$(sha256sum environment.yml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      # condaのパッケージキャッシュ
      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /usr/share/miniconda3/pkgs
          key: conda-pkgs-${{ matrix.os }}-${{ matrix.python-version }}-${{ steps.env-hash.outputs.hash }}
          restore-keys: |
            conda-pkgs-${{ matrix.os }}-${{ matrix.python-version }}-
            conda-pkgs-${{ matrix.os }}-

      # 環境の作成または更新
      - name: Create conda environment
        shell: bash -l {0}
        run: |
          conda env create -f environment.yml || conda env update -f environment.yml

      # テスト依存関係のインストール
      - name: Install test dependencies
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pip install pytest pytest-cov pytest-xdist

      # Models テストスイート
      - name: Run models test suite
        if: matrix.test-suite == 'models'
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_models.py -v --tb=short

      # Async テストスイート
      - name: Run async test suite
        if: matrix.test-suite == 'async'
        shell: bash -l {0}
        run: |
          conda activate zcrc-chronos
          pytest tests/test_async_prediction.py -v --tb=short

      # Extended テストスイート（predict_zero_shot の残りのテスト）
      - name: Run extended test suite
        if: matrix.test-suite == 'extended'
        shell: bash -l {0}
        timeout-minutes: 10
        continue-on-error: true
        run: |
          conda activate zcrc-chronos
          pytest tests/test_predict_zero_shot.py -k "not TestPredictZeroShotInvalidInputs" -v --tb=short --maxfail=3
